name: Build ChatWay Windows x64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Check pnpm
        run: pnpm --version

      - name: Build ChatWay
        run: pnpm dlx pake-cli https://go.chatway.app --name ChatWay --width 1440 --height 900 --targets x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatway-windows-x64
          path: |
            **/*.exe
            **/*.msi
